<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S</title>
<style>
    /* ベーススタイル */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #050505;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    }

    /* 背景キャンバスの固定 */
    #cloudCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      display: block;
    }

    /* 周辺を暗くするオーバーレイ */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 20%, rgba(0,0,0,0.85) 100%);
      z-index: 5;
    }

    /* 全体のコンテナ */
    .wrapper {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 0;
      box-sizing: border-box;
      z-index: 10;
    }

    /* --- 基本の枠の設定 --- */
    .content-container {
      width: 85%;
      max-width: 800px;
      height: auto;
      display: block;
      margin: 15px auto;
      padding: 30px 40px;
      color: white;
      text-align: center;
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-sizing: border-box;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      -webkit-tap-highlight-color: transparent; /* タップ時のハイライトを消去 */
    }

    /* --- 横並びボタンエリアの制御 --- */
    .container-row {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 15px;
      width: 100%;
      max-width: none;
      margin: 10px auto 0;
    }

    .container-row .content-container {
      flex: 1;
      width: auto;
      min-width: 150px;
      max-width: none;
      margin: 0;
      cursor: pointer;
      padding: 15px 5px;
      white-space: nowrap;
      overflow: hidden;
    }

    .container-row h2 {
      font-size: clamp(0.8rem, 2.3vw, 1.1rem) !important;
      margin: 0 !important;
    }
    
    .container-row .status-badge {
      font-size: clamp(0.6rem, 1.8vw, 0.75rem);
      white-space: nowrap;
    }

    /* --- ホバーエフェクト（マウス操作時のみ適用してスマホの残存を防止） --- */
    @media (hover: hover) {
      .content-container[onclick]:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.3);
        transform: translateY(-4px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
    }

    .content-container[onclick]:active {
      transform: translateY(-1px);
      transition: 0.1s;
    }

    /* --- 文字スタイル --- */
    h1, h2, h3 {
      margin: 10px 0;
      letter-spacing: 0.15em;
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .email-display {
      transition: color 0.3s ease;
    }

    .status-badge {
      font-size: 0.75rem;
      color: #00ffcc;
      opacity: 0.6;
      margin-top: 10px;
      transition: all 0.3s ease;
      letter-spacing: 0.05em;
    }

    /* --- 流れるタグ（Ticker）の設定 --- */
    .ticker-wrapper {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 40px;
    }

    .ticker-label {
      flex-shrink: 0;
      width: 80px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 10px;
      margin-right: 10px;
      border-right: 1px solid rgba(255, 255, 255, 0.2);
      line-height: 1;
    }

    .ticker-container {
      flex-grow: 1;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    }

    .ticker-text {
      display: inline-block;
      padding-left: 100%;
      animation: scroll-left 15s linear infinite;
      font-size: 1.1rem;
    }

    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .nested-box {
      width: 100% !important;
      max-width: none !important;
      padding: 10px 0 !important;
      margin: 15px 0 0 0 !important;
      background: rgba(255, 255, 255, 0.05) !important;
    }

    @media (max-width: 480px) {
      .container-row {
        flex-wrap: wrap;
      }
      .container-row .content-container {
        min-width: 100%;
        padding: 15px 10px;
      }
      .content-container {
        width: 92%;
        padding: 20px 25px;
      }
      h1 { font-size: clamp(2rem, 15vw, 6rem) !important; }
    }

    .dual-line {
      display: block;
      white-space: nowrap;
      font-size: clamp(1.2rem, 5vw, 2.5rem) !important;
    }

    @media (max-width: 480px) {
      .dual-line {
        letter-spacing: 0.05em;
      }
    }
</style>
</head>
<body>

  <canvas id="cloudCanvas"></canvas>
  <div class="overlay"></div>

  <div class="wrapper">
    
<div class="content-container">
  <!-- 大文字 S -->
  <h1 style="font-size: 100px; margin: 0;">S</h1>
  
  <!-- 入れ子枠 -->
  <div class="content-container nested-box">
    <div class="ticker-wrapper">
      <!-- 左に固定される「タグ」 -->
      <div class="ticker-label">タグ</div>
      
      <!-- 右側で流れるテキスト -->
      <div class="ticker-container">
        <span class="ticker-text" style="color:rgb(255, 255, 255);">
          #起業準備中 　#働かないを起業するンゴ
        </span>
      </div>
    </div>
  </div>
</div>

<div class="content-container">
  <!-- クラス dual-line を追加 -->
  <h1 class="dual-line" style="font-size: 40px; line-height: 1.3;">
    実体は幻<br>ゼロから、世界を演算する。
  </h1>
</div>

<!-- 連絡先情報を1つにまとめた枠 -->
<div class="content-container">
  <h2 style="font-size: 30px;">連絡先 / Connect</h2>
  
  <!-- 【追加】メールアドレス表示専用の枠 -->
<div class="content-container" style="width: 100%; max-width: none; background: rgba(255, 255, 255, 0.05); margin: 20px 0; padding: 15px 10px; box-sizing: border-box;">
  <h2 style="font-size: clamp(16px, 4vw, 25px); margin: 0; word-break: break-all;">sprofilek@ymail.ne.jp</h2>
  </div>

  <!-- アクションボタン（横並びエリア） -->
  <div class="container-row">
    <!-- 1つ目のボタン：メール作成 -->
    <div class="content-container" onclick="copyAndMail('sprofilek@ymail.ne.jp')">
      <h2 id="email-address" style="font-size: 1.1rem;">メールを作成</h2>
      <div class="status-badge">クリックでメーラー起動</div>
    </div>

    <!-- 2つ目のボタン：コピー -->
    <div class="content-container copy-only-box" onclick="pureCopy('sprofilek@ymail.ne.jp')">
      <h2 id="copy-target" class="email-display" style="font-size: 1.1rem;">アドレスをコピー</h2>
      <div id="copy-status" class="status-badge">クリップボードに保存します</div>
    </div>
  </div>
</div>
  </div>

<script>
    const canvas = document.getElementById('cloudCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let puffs = [];
    const PUFF_COUNT = 120; 

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    const cloudTextures = [];
    const TEXTURE_RADIUS = 128;
    const palettes = [
      { r: 45, g: 50, b: 60 }, { r: 65, g: 70, b: 85 },
      { r: 25, g: 28, b: 35 }, { r: 55, g: 60, b: 70 },
      { r: 35, g: 38, b: 45 }, { r: 90, g: 95, b: 105 }
    ];

    palettes.forEach(color => {
      const offCanvas = document.createElement('canvas');
      offCanvas.width = TEXTURE_RADIUS * 2;
      offCanvas.height = TEXTURE_RADIUS * 2;
      const offCtx = offCanvas.getContext('2d');
      const grad = offCtx.createRadialGradient(TEXTURE_RADIUS, TEXTURE_RADIUS, 0, TEXTURE_RADIUS, TEXTURE_RADIUS, TEXTURE_RADIUS);
      grad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 1)`);
      grad.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`); 
      grad.addColorStop(0.8, `rgba(${color.r}, ${color.g}, ${color.b}, 0.2)`); 
      grad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
      offCtx.fillStyle = grad;
      offCtx.beginPath();
      offCtx.arc(TEXTURE_RADIUS, TEXTURE_RADIUS, TEXTURE_RADIUS, 0, Math.PI * 2);
      offCtx.fill();
      cloudTextures.push(offCanvas);
    });

    class Puff {
      constructor(isInitial = false) {
        this.subPuffs = []; 
        this.init(isInitial);
      }
      init(isInitial) {
        this.z = Math.random() * 100 + 20; 
        this.x = isInitial ? Math.random() * width : width + (Math.random() * 300 + 100);
        this.y = (Math.random() * height) * 1.2 - height * 0.1;
        this.baseRadius = Math.random() * 180 + 80;
        this.radius = this.baseRadius * (100 / this.z);
        this.speedX = -(Math.random() * 0.6 + 0.4) * (100 / this.z);
        this.speedY = (Math.random() - 0.5) * 0.08; 
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.002;
        this.alpha = isInitial ? Math.random() * 0.5 : 0;
        this.maxAlpha = Math.random() * 0.4 + 0.3; 
        this.scaleY = Math.random() * 0.2 + 0.7;
        const numSubPuffs = Math.floor(Math.random() * 4) + 3; 
        this.subPuffs = [];
        for (let i = 0; i < numSubPuffs; i++) {
          this.subPuffs.push({
            x: (Math.random() - 0.5) * this.radius * 0.8, 
            y: (Math.random() - 0.5) * this.radius * 0.5, 
            size: Math.random() * 0.6 + 0.4, 
            alpha: Math.random() * 0.4 + 0.6, 
            scaleYOffset: (Math.random() - 0.5) * 0.15 
          });
        }
        let textureIndex = Math.floor(Math.random() * 5);
        if (Math.random() > 0.85) textureIndex = 5;
        this.texture = cloudTextures[textureIndex];
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        if (this.alpha < this.maxAlpha) this.alpha += 0.006;
        this.subPuffs.forEach(subPuff => {
          const s = Math.sin(this.rotationSpeed);
          const c = Math.cos(this.rotationSpeed);
          const nx = subPuff.x * c - subPuff.y * s;
          const ny = subPuff.x * s + subPuff.y * c;
          subPuff.x = nx;
          subPuff.y = ny;
        });
        if (this.x < -this.radius * 2) this.init(false);
      }
      draw() {
        this.subPuffs.forEach(subPuff => {
          ctx.save();
          ctx.globalAlpha = this.alpha * subPuff.alpha;
          ctx.translate(this.x + subPuff.x, this.y + subPuff.y);
          ctx.rotate(this.rotation); 
          ctx.scale(1, (this.scaleY + subPuff.scaleYOffset)); 
          const subPuffRadius = this.radius * subPuff.size;
          ctx.drawImage(this.texture, -subPuffRadius, -subPuffRadius, subPuffRadius * 2, subPuffRadius * 2);
          ctx.restore();
        });
      }
    }

    for (let i = 0; i < PUFF_COUNT; i++) puffs.push(new Puff(true));
    puffs.sort((a, b) => b.z - a.z);

    function animate() {
      const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
      bgGrad.addColorStop(0, '#0c0e14');   
      bgGrad.addColorStop(0.5, '#14161f'); 
      bgGrad.addColorStop(1, '#1b1e26');   
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, width, height);
      puffs.forEach(puff => {
        puff.update();
        puff.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();

    // --- インタラクション用タイマー管理 ---
    let emailTimer = null;
    let copyTimer = null;

    function copyAndMail(email) {
      if (emailTimer) clearTimeout(emailTimer);
      navigator.clipboard.writeText(email).then(() => {
        const emailDisplay = document.getElementById('email-address');
        const originalText = "メールを作成";
        
        emailDisplay.innerText = "コピーしました";
        emailDisplay.style.color = "#00ffcc";
        
        emailTimer = setTimeout(() => {
          emailDisplay.innerText = originalText;
          emailDisplay.style.color = "#ffffff";
          emailTimer = null;
          window.location.href = `mailto:${email}`;
        }, 600);
      }).catch(() => {
        window.location.href = `mailto:${email}`;
      });
    }

    function pureCopy(text) {
      if (copyTimer) clearTimeout(copyTimer);
      navigator.clipboard.writeText(text).then(() => {
        const targetText = document.getElementById('copy-target');
        const statusBadge = document.getElementById('copy-status');
        const originalText = "アドレスをコピー";

        targetText.style.color = "#00ffcc";
        targetText.innerText = "コピーしました";
        statusBadge.innerText = "クリップボードに保存しました";
        statusBadge.style.opacity = "1";

        copyTimer = setTimeout(() => {
          targetText.style.color = "#ffffff";
          targetText.innerText = originalText;
          statusBadge.innerText = "クリップボードに保存します";
          statusBadge.style.opacity = "0.6";
          copyTimer = null;
        }, 1500);
      });
    }
</script>
</body>
</html>
