<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S</title>
  <style>
    /* ベーススタイル */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #050505;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    }

    /* 背景キャンバスの固定 */
    #cloudCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      display: block;
    }

    /* 周辺を暗くするオーバーレイ */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 20%, rgba(0,0,0,0.85) 100%);
      z-index: 5;
    }

    /* 全体のコンテナ */
    .wrapper {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 0;
      box-sizing: border-box;
      z-index: 10;
    }

    /* --- 基本の枠の設定 --- */
    .content-container {
      width: 85%;
      max-width: 800px;
      height: auto;
      display: block;
      margin: 15px auto;
      padding: 30px 40px;
      color: white;
      text-align: center;
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-sizing: border-box;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

/* 横並びの中にある枠専用の設定（ここを微調整） */
.container-row .content-container {
  flex: 1;
  width: auto;
  /* 最小幅を 300px から 200px 程度に下げることで、親枠の中でも横並びを維持します */
  min-width: 180px; 
  max-width: none;
  margin: 0;
  cursor: pointer;
  padding: 15px 10px; /* 横並び時は内側の余白を少しタイトに */
}

/* 親の row 自体も、親枠の padding に負けないよう幅を調整 */
.container-row {
  display: flex;
  flex-wrap: nowrap;     /* 強制的に横並びを維持したい場合は nowrap に */
  justify-content: center;
  gap: 15px;             /* 隙間を少し詰めると並びやすくなります */
  width: 100%;           /* 親枠の 100% */
  max-width: none;       /* 個別の制限を解除 */
  margin: 10px auto 0;
}

    /* --- ホバーエフェクト（ボタン系のみに適用） --- */
    .content-container[onclick]:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-4px); /* 上に少し浮く */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* クリックした瞬間の沈み込み */
    .content-container[onclick]:active {
      transform: translateY(-1px);
      transition: 0.1s;
    }

    /* 文字スタイル */
    h1, h2, h3 {
      margin: 10px 0;
      letter-spacing: 0.15em;
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .email-display {
      transition: color 0.3s ease;
    }

    .status-badge {
      font-size: 0.75rem;
      color: #00ffcc;
      opacity: 0.6;
      margin-top: 10px;
      transition: all 0.3s ease;
      letter-spacing: 0.05em;
    }

/* スマホサイズ（本当に幅が狭い時）だけは縦並びにする */
@media (max-width: 480px) {
  .container-row {
    flex-wrap: wrap;     /* スマホでは折り返しを許可 */
  }
  .container-row .content-container {
    min-width: 100%;     /* スマホでは1つで横幅いっぱい */
  }
}

 /* 入れ子枠の中を横並びにする */
.ticker-wrapper {
  display: flex;
  align-items: center; /* 垂直方向の中央揃え */
  width: 100%;
}

/* 「タグ」という固定文字のスタイル */
.ticker-label {
  flex-shrink: 0;
  width: 80px;
  font-weight: bold;
  color: rgba(255, 255, 255, 0.9);
  
  /* --- 中央寄せのための設定 --- */
  display: flex;
  justify-content: center; /* 水平方向の中央 */
  align-items: center;     /* 垂直方向の中央 */
  
  text-align: center;      /* テキスト自体を中央揃え */
  padding: 0 10px;         /* 左右の余白 */
  margin-right: 10px;
  border-right: 1px solid rgba(255, 255, 255, 0.2);
  
  /* 枠の高さに合わせるための設定 */
  line-height: 1;          /* 余計な行間を排除 */
}

/* 親要素（念のため確認） */
.ticker-wrapper {
  display: flex;
  align-items: center;     /* これで子要素同士の高さ中央が揃います */
  width: 100%;
  min-height: 40px;        /* 枠の高さを少し確保すると中央感が際立ちます */
}

/* 流れるエリア（残りの幅をすべて使う） */
.ticker-container {
  flex-grow: 1;         /* 残りのスペースをすべて占有 */
  overflow: hidden;
  white-space: nowrap;
  position: relative;
  /* 左右をフェードアウトさせる（文字が消える演出） */
  mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
}

.ticker-text {
  display: inline-block;
  padding-left: 100%;   /* 右端からスタート */
  animation: scroll-left 15s linear infinite;
  font-size: 1.1rem;
}

@keyframes scroll-left {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* 入れ子枠（nested-box）自体の調整 */
.nested-box {
  width: 100% !important;
  max-width: none !important;
  padding: 10px 0 !important;
  margin: 15px 0 0 0 !important; /* Aの下に配置 */
}

  </style>
</head>
<body>

  <canvas id="cloudCanvas"></canvas>
  <div class="overlay"></div>

  <div class="wrapper">
    
<div class="content-container">
  <!-- 大文字 S -->
  <h1 style="font-size: 100px; margin: 0;">S</h1>
  
  <!-- 入れ子枠 -->
  <div class="content-container nested-box">
    <div class="ticker-wrapper">
      <!-- 左に固定される「タグ」 -->
      <div class="ticker-label">タグ</div>
      
      <!-- 右側で流れるテキスト -->
      <div class="ticker-container">
        <span class="ticker-text" style="color:rgb(255, 255, 255);">
          #起業準備中 　#働かないを起業するンゴ
        </span>
      </div>
    </div>
  </div>
</div>

    <div class="content-container">
      <h1 style="font-size: 40px; line-height: 1.3;">実体は幻<br>ゼロから、世界を演算する。</h1>
    </div>

<!-- 連絡先情報を1つにまとめた枠 -->
<div class="content-container">
  <h2 style="font-size: 30px;">連絡先 / Connect</h2>
  
  <!-- 【追加】メールアドレス表示専用の枠 -->
  <div class="content-container" style="width: 100%; max-width: none; background: rgba(255, 255, 255, 0.05); margin: 20px 0;">
    <h2 style="font-size: 25px;">sprofilek@ymail.ne.jp</h2>
  </div>

  <!-- アクションボタン（横並びエリア） -->
  <div class="container-row">
    <!-- 1つ目のボタン：メール作成 -->
    <div class="content-container" onclick="copyAndMail('sprofilek@ymail.ne.jp')">
      <h2 id="email-address" style="font-size: 1.1rem;">メールを作成</h2>
      <div class="status-badge">クリックでメーラー起動</div>
    </div>

    <!-- 2つ目のボタン：コピー -->
    <div class="content-container copy-only-box" onclick="pureCopy('sprofilek@ymail.ne.jp')">
      <h2 id="copy-target" class="email-display" style="font-size: 1.1rem;">アドレスをコピー</h2>
      <div id="copy-status" class="status-badge">クリップボードに保存します</div>
    </div>
  </div>
</div>
  </div>

  <script>
    // --- 背景アニメーション (ロジックは変更なし) ---
    const canvas = document.getElementById('cloudCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let puffs = [];
    const PUFF_COUNT = 120; 

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    const cloudTextures = [];
    const TEXTURE_RADIUS = 128;
    const palettes = [
      { r: 45, g: 50, b: 60 }, { r: 65, g: 70, b: 85 },
      { r: 25, g: 28, b: 35 }, { r: 55, g: 60, b: 70 },
      { r: 35, g: 38, b: 45 }, { r: 90, g: 95, b: 105 }
    ];

    palettes.forEach(color => {
      const offCanvas = document.createElement('canvas');
      offCanvas.width = TEXTURE_RADIUS * 2;
      offCanvas.height = TEXTURE_RADIUS * 2;
      const offCtx = offCanvas.getContext('2d');
      const grad = offCtx.createRadialGradient(TEXTURE_RADIUS, TEXTURE_RADIUS, 0, TEXTURE_RADIUS, TEXTURE_RADIUS, TEXTURE_RADIUS);
      grad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 1)`);
      grad.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`); 
      grad.addColorStop(0.8, `rgba(${color.r}, ${color.g}, ${color.b}, 0.2)`); 
      grad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
      offCtx.fillStyle = grad;
      offCtx.beginPath();
      offCtx.arc(TEXTURE_RADIUS, TEXTURE_RADIUS, TEXTURE_RADIUS, 0, Math.PI * 2);
      offCtx.fill();
      cloudTextures.push(offCanvas);
    });

    class Puff {
      constructor(isInitial = false) {
        this.subPuffs = []; 
        this.init(isInitial);
      }
      init(isInitial) {
        this.z = Math.random() * 100 + 20; 
        this.x = isInitial ? Math.random() * width : width + (Math.random() * 300 + 100);
        this.y = (Math.random() * height) * 1.2 - height * 0.1;
        this.baseRadius = Math.random() * 180 + 80;
        this.radius = this.baseRadius * (100 / this.z);
        this.speedX = -(Math.random() * 0.6 + 0.4) * (100 / this.z);
        this.speedY = (Math.random() - 0.5) * 0.08; 
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.002;
        this.alpha = isInitial ? Math.random() * 0.5 : 0;
        this.maxAlpha = Math.random() * 0.4 + 0.3; 
        this.scaleY = Math.random() * 0.2 + 0.7;
        const numSubPuffs = Math.floor(Math.random() * 4) + 3; 
        this.subPuffs = [];
        for (let i = 0; i < numSubPuffs; i++) {
          this.subPuffs.push({
            x: (Math.random() - 0.5) * this.radius * 0.8, 
            y: (Math.random() - 0.5) * this.radius * 0.5, 
            size: Math.random() * 0.6 + 0.4, 
            alpha: Math.random() * 0.4 + 0.6, 
            scaleYOffset: (Math.random() - 0.5) * 0.15 
          });
        }
        let textureIndex = Math.floor(Math.random() * 5);
        if (Math.random() > 0.85) textureIndex = 5;
        this.texture = cloudTextures[textureIndex];
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        if (this.alpha < this.maxAlpha) this.alpha += 0.006;
        this.subPuffs.forEach(subPuff => {
          const s = Math.sin(this.rotationSpeed);
          const c = Math.cos(this.rotationSpeed);
          const nx = subPuff.x * c - subPuff.y * s;
          const ny = subPuff.x * s + subPuff.y * c;
          subPuff.x = nx;
          subPuff.y = ny;
        });
        if (this.x < -this.radius * 2) this.init(false);
      }
      draw() {
        this.subPuffs.forEach(subPuff => {
          ctx.save();
          ctx.globalAlpha = this.alpha * subPuff.alpha;
          ctx.translate(this.x + subPuff.x, this.y + subPuff.y);
          ctx.rotate(this.rotation); 
          ctx.scale(1, (this.scaleY + subPuff.scaleYOffset)); 
          const subPuffRadius = this.radius * subPuff.size;
          ctx.drawImage(this.texture, -subPuffRadius, -subPuffRadius, subPuffRadius * 2, subPuffRadius * 2);
          ctx.restore();
        });
      }
    }

    for (let i = 0; i < PUFF_COUNT; i++) puffs.push(new Puff(true));
    puffs.sort((a, b) => b.z - a.z);

    function animate() {
      const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
      bgGrad.addColorStop(0, '#0c0e14');   
      bgGrad.addColorStop(0.5, '#14161f'); 
      bgGrad.addColorStop(1, '#1b1e26');   
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, width, height);
      puffs.forEach(puff => {
        puff.update();
        puff.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();

    // --- インタラクション用関数 ---
    function copyAndMail(email) {
      navigator.clipboard.writeText(email).then(() => {
        const emailDisplay = document.getElementById('email-address');
        const originalText = emailDisplay.innerText;
        
        emailDisplay.innerText = "コピーしました";
        emailDisplay.style.color = "#00ffcc";
        
        setTimeout(() => {
          emailDisplay.innerText = originalText;
          emailDisplay.style.color = "";
          window.location.href = `mailto:${email}`;
        }, 600);
      }).catch(() => {
        window.location.href = `mailto:${email}`;
      });
    }

    function pureCopy(text) {
      navigator.clipboard.writeText(text).then(() => {
        const targetText = document.getElementById('copy-target');
        const statusBadge = document.getElementById('copy-status');
        const originalColor = targetText.style.color;

        targetText.style.color = "#00ffcc";
        targetText.innerText = "コピーしました";
        statusBadge.innerText = "クリップボードに保存しました";
        statusBadge.style.opacity = "1";

        setTimeout(() => {
          targetText.style.color = originalColor;
          targetText.innerText = "アドレスをコピー";
          statusBadge.innerText = "クリップボードに保存します";
          statusBadge.style.opacity = "0.6";
        }, 1500);
      });
    }
  </script>
</body>
</html>
