<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S</title>
  <style>
    /* ベーススタイル */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #050505;
      /* 枠が増えてもスクロールできるように hidden を外すか auto に設定 */
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    }

    /* 背景キャンバスの固定 */
    #cloudCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }

    /* 周辺を暗くするオーバーレイ */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 20%, rgba(0,0,0,0.85) 100%);
      z-index: 5;
    }

    /* 全体のコンテナ（枠を中央に寄せるための親） */
    .wrapper {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 0; /* 上下の余白 */
      box-sizing: border-box;
      z-index: 10;
    }

    /* 文字を置くエリアのデザイン */
/* 枠自体の設定 */
.content-container {
  width: 85%;
  max-width: 800px;
  height: auto;          /* 縦は自動 */
  display: block;
  margin: 10px auto;     /* 枠の外側の上下の間隔を少し狭く */
  
  /* --- ここが重要：余白を最小限にする --- */
  padding: 10px 40px;    /* 上下を 40px → 10px に大幅縮小 */
  
  color: white;
  text-align: center;
  background: rgba(255, 255, 255, 0.03); 
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 12px;   /* 枠が薄くなるので角丸も少し控えめに */
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-sizing: border-box;
}

/* メールリンクのスタイル */
.mail-link {
  text-decoration: none; /* 下線を消す */
  color: inherit;        /* 文字色を親要素(白)に合わせる */
  display: block;        /* リンクの当たり判定を広げる */
  transition: opacity 0.2s;
}

/* マウスを乗せた時に少し反応させる（親切設計） */
.mail-link:hover {
  opacity: 0.7;
}

/* --- 文字が枠を押し広げないようにマージンをリセット --- */
.content-container h1 {
  font-size: 1.8rem;     /* サイズを少し抑える */
  margin: 5px 0;         /* 上下の勝手な余白を最小限に */
  letter-spacing: 0.1em;
}

.content-container p {
  font-size: 0.95rem;
  margin: 5px 0;         /* 上下の勝手な余白を最小限に */
  line-height: 1.4;      /* 行間を少し詰めるとより締まります */
}

    h1 {
      font-size: 2.5rem;
      letter-spacing: 0.15em;
      margin-top: 0;
      margin-bottom: 20px;
      text-transform: uppercase;
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    p {
      font-size: 1rem;
      line-height: 1.8;
      margin: 0;
      color: rgba(255, 255, 255, 0.85);
    }
  </style>
</head>
<body>

  <!-- 背景要素 -->
  <canvas id="cloudCanvas"></canvas>
  <div class="overlay"></div>

  <!-- コンテンツ要素（ここを編集） -->
  <div class="wrapper">
    
    <!-- 1つ目の枠 -->
    <div class="content-container">
      <h1 style="font-size: 100px;">S</h1>
      <h3 style="color:rgba(193, 225, 255, 0.769)">タグ: #起業準備中 #働かないを起業するンゴ</h3>
    </div>

    <div class="content-container">
      <h1 style="font-size: 40px;">実体は幻<br>ゼロから、世界を演算する。</h1>
    </div>

    <div class="content-container">
      <h2 style="font-size: 30;">連絡先</h2>

      <a href="mailto:sprofilek@ymail.ne.jp" class="mail-link">
    <h2>sprofilek@ymail.ne.jp</h2>
    <p style="font-size: 0.8rem;">クリックするとメールを作成できます。</p>
  </a>
  
    </div>

  </div>

  <script>
    const canvas = document.getElementById('cloudCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let puffs = [];
    const PUFF_COUNT = 120; 

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    window.addEventListener('resize', resize);
    resize();

    const cloudTextures = [];
    const TEXTURE_RADIUS = 128;

    const palettes = [
      { r: 45, g: 50, b: 60 },
      { r: 65, g: 70, b: 85 },
      { r: 25, g: 28, b: 35 },
      { r: 55, g: 60, b: 70 },
      { r: 35, g: 38, b: 45 },
      { r: 90, g: 95, b: 105 }
    ];

    palettes.forEach(color => {
      const offCanvas = document.createElement('canvas');
      offCanvas.width = TEXTURE_RADIUS * 2;
      offCanvas.height = TEXTURE_RADIUS * 2;
      const offCtx = offCanvas.getContext('2d');
      
      const grad = offCtx.createRadialGradient(TEXTURE_RADIUS, TEXTURE_RADIUS, 0, TEXTURE_RADIUS, TEXTURE_RADIUS, TEXTURE_RADIUS);
      grad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 1)`);
      grad.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`); 
      grad.addColorStop(0.8, `rgba(${color.r}, ${color.g}, ${color.b}, 0.2)`); 
      grad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);

      offCtx.fillStyle = grad;
      offCtx.beginPath();
      offCtx.arc(TEXTURE_RADIUS, TEXTURE_RADIUS, TEXTURE_RADIUS, 0, Math.PI * 2);
      offCtx.fill();
      cloudTextures.push(offCanvas);
    });

    class Puff {
      constructor(isInitial = false) {
        this.subPuffs = []; 
        this.init(isInitial);
      }

      init(isInitial) {
        this.z = Math.random() * 100 + 20; 
        this.x = isInitial ? Math.random() * width : width + (Math.random() * 300 + 100);
        this.y = (Math.random() * height) * 1.2 - height * 0.1;
        this.baseRadius = Math.random() * 180 + 80;
        this.radius = this.baseRadius * (100 / this.z);
        this.speedX = -(Math.random() * 0.6 + 0.4) * (100 / this.z);
        this.speedY = (Math.random() - 0.5) * 0.08; 
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.002;
        this.alpha = isInitial ? Math.random() * 0.5 : 0;
        this.maxAlpha = Math.random() * 0.4 + 0.3; 
        this.scaleY = Math.random() * 0.2 + 0.7;

        const numSubPuffs = Math.floor(Math.random() * 4) + 3; 
        this.subPuffs = [];
        for (let i = 0; i < numSubPuffs; i++) {
          this.subPuffs.push({
            x: (Math.random() - 0.5) * this.radius * 0.8, 
            y: (Math.random() - 0.5) * this.radius * 0.5, 
            size: Math.random() * 0.6 + 0.4, 
            alpha: Math.random() * 0.4 + 0.6, 
            scaleYOffset: (Math.random() - 0.5) * 0.15 
          });
        }

        let textureIndex = Math.floor(Math.random() * 5);
        if (Math.random() > 0.85) textureIndex = 5;
        this.texture = cloudTextures[textureIndex];
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        if (this.alpha < this.maxAlpha) this.alpha += 0.006;

        this.subPuffs.forEach(subPuff => {
          const s = Math.sin(this.rotationSpeed);
          const c = Math.cos(this.rotationSpeed);
          const nx = subPuff.x * c - subPuff.y * s;
          const ny = subPuff.x * s + subPuff.y * c;
          subPuff.x = nx;
          subPuff.y = ny;
        });

        if (this.x < -this.radius * 2) this.init(false);
      }

      draw() {
        this.subPuffs.forEach(subPuff => {
          ctx.save();
          ctx.globalAlpha = this.alpha * subPuff.alpha;
          ctx.translate(this.x + subPuff.x, this.y + subPuff.y);
          ctx.rotate(this.rotation); 
          ctx.scale(1, (this.scaleY + subPuff.scaleYOffset)); 
          const subPuffRadius = this.radius * subPuff.size;
          ctx.drawImage(this.texture, -subPuffRadius, -subPuffRadius, subPuffRadius * 2, subPuffRadius * 2);
          ctx.restore();
        });
      }
    }

    for (let i = 0; i < PUFF_COUNT; i++) puffs.push(new Puff(true));
    puffs.sort((a, b) => b.z - a.z);

    function animate() {
      const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
      bgGrad.addColorStop(0, '#0c0e14');   
      bgGrad.addColorStop(0.5, '#14161f'); 
      bgGrad.addColorStop(1, '#1b1e26');   

      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, width, height);

      puffs.forEach(puff => {
        puff.update();
        puff.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
